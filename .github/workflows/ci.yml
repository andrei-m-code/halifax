name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Create local NuGet source
        run: |
          mkdir -p local-packages
          dotnet nuget add source $(pwd)/local-packages --name local

      - name: Build and pack Halifax.Domain
        run: |
          dotnet build Halifax.Domain/Halifax.Domain.csproj -c Release
          dotnet pack Halifax.Domain/Halifax.Domain.csproj -c Release --no-build -o local-packages

      - name: Build and pack Halifax.Core
        run: |
          dotnet build Halifax.Core/Halifax.Core.csproj -c Release
          dotnet pack Halifax.Core/Halifax.Core.csproj -c Release --no-build -o local-packages

      - name: Build
        run: dotnet build Halifax.sln -c Release

      - name: Test
        run: dotnet test Halifax.sln -c Release --no-build
