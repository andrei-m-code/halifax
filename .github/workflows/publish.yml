name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Create local NuGet source
        run: |
          mkdir -p local-packages
          dotnet nuget add source $(pwd)/local-packages --name local

      - name: Build and pack Halifax.Domain
        run: |
          dotnet restore Halifax.Domain/Halifax.Domain.csproj
          dotnet pack Halifax.Domain/Halifax.Domain.csproj -c Release -o out
          cp out/Halifax.Domain.*.nupkg local-packages/

      - name: Build and pack Halifax.Core
        run: |
          dotnet restore Halifax.Core/Halifax.Core.csproj
          dotnet pack Halifax.Core/Halifax.Core.csproj -c Release -o out
          cp out/Halifax.Core.*.nupkg local-packages/

      - name: Build and pack Halifax.Api
        run: |
          dotnet restore Halifax.Api/Halifax.Api.csproj
          dotnet pack Halifax.Api/Halifax.Api.csproj -c Release -o out

      - name: Build and pack Halifax.Http
        run: |
          dotnet restore Halifax.Http/Halifax.Http.csproj
          dotnet pack Halifax.Http/Halifax.Http.csproj -c Release -o out

      - name: Build and pack Halifax.Excel
        run: |
          dotnet restore Halifax.Excel/Halifax.Excel.csproj
          dotnet pack Halifax.Excel/Halifax.Excel.csproj -c Release -o out

      - name: Push to NuGet
        run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
